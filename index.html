<script>
// ================================================================
//  ROCKET DODGE – Moteur de jeu complet
//  Concept original : vaisseau spatial qui esquive des astéroïdes
// ================================================================

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- État ----
let state    = 'idle';   // idle | playing | dead
let score    = 0;
let best     = parseInt(localStorage.getItem('rocketDodgeBest') || '0');
let level    = 1;
let lives    = 3;
let invincible = 0;   // frames d'invincibilité après un hit
let frameId  = null;
let tick     = 0;

// ---- Vaisseau ----
const ship = {
  x: W / 2, y: H - 90,
  w: 32, h: 48,
  speed: 5,
  vx: 0,
  thrustAnim: 0,
  color: '#00d2ff',
};

// ---- Contrôles ----
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// Tactile
let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
  if (state === 'idle' || state === 'dead') { startGame(); return; }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches[0]) touchX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchend', () => { touchX = null; });
canvas.addEventListener('click', () => {
  if (state === 'idle' || state === 'dead') startGame();
});

// ---- Astéroïdes ----
let asteroids = [];
let astTimer  = 0;
let astInterval = 55;
let astSpeed    = 2.2;

// ---- Étoiles ----
const stars = Array.from({length: 120}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.4 + 0.2,
  speed: Math.random() * 1.5 + 0.3,
  alpha: Math.random() * 0.8 + 0.2,
}));

// ---- Nébuleuses ----
const nebulae = Array.from({length: 4}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  rx: Math.random() * 120 + 60,
  ry: Math.random() * 60 + 30,
  hue: Math.random() * 60 + 200,
  alpha: Math.random() * 0.06 + 0.02,
  speed: Math.random() * 0.4 + 0.1,
}));

// ---- Particules ----
let particles = [];

// ---- Power-ups ----
let powerups = [];
let puTimer  = 0;

// ================================================================
//  DESSIN
// ================================================================

function drawBg() {
  ctx.fillStyle = '#050a18';
  ctx.fillRect(0, 0, W, H);

  // Nébuleuses
  nebulae.forEach(n => {
    ctx.save();
    ctx.globalAlpha = n.alpha;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.rx);
    g.addColorStop(0, `hsl(${n.hue},80%,60%)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(n.x, n.y, n.rx, n.ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Étoiles
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  });
}

function drawShip() {
  const { x, y, w, h } = ship;
  ctx.save();
  ctx.translate(x, y);

  // Clignotement si invincible
  if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) {
    ctx.restore(); return;
  }

  // Flamme de propulsion
  ship.thrustAnim = (ship.thrustAnim + 0.3) % (Math.PI * 2);
  const flameH = 18 + Math.sin(ship.thrustAnim) * 8;
  const flameGrad = ctx.createLinearGradient(0, h / 2, 0, h / 2 + flameH + 10);
  flameGrad.addColorStop(0, 'rgba(255,200,50,0.9)');
  flameGrad.addColorStop(0.4, 'rgba(255,80,0,0.7)');
  flameGrad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = flameGrad;
  ctx.beginPath();
  ctx.moveTo(-w * 0.25, h / 2);
  ctx.lineTo(0, h / 2 + flameH);
  ctx.lineTo(w * 0.25, h / 2);
  ctx.closePath();
  ctx.fill();

  // Corps du vaisseau
  const bodyGrad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
  bodyGrad.addColorStop(0,   '#0a2a4a');
  bodyGrad.addColorStop(0.3, '#00d2ff');
  bodyGrad.addColorStop(0.7, '#7b2ff7');
  bodyGrad.addColorStop(1,   '#0a1a3a');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);           // pointe
  ctx.lineTo(w / 2, h / 2 - 8);   // bas droite
  ctx.lineTo(w * 0.7, h / 2);      // aile droite
  ctx.lineTo(w * 0.3, h / 2 - 4);
  ctx.lineTo(0, h / 2 - 2);
  ctx.lineTo(-w * 0.3, h / 2 - 4);
  ctx.lineTo(-w * 0.7, h / 2);     // aile gauche
  ctx.lineTo(-w / 2, h / 2 - 8);
  ctx.closePath();
  ctx.fill();

  // Contour lumineux
  ctx.strokeStyle = 'rgba(0,210,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Cockpit
  const cockpitGrad = ctx.createRadialGradient(-4, -h * 0.15, 1, 0, -h * 0.1, 10);
  cockpitGrad.addColorStop(0, 'rgba(200,240,255,0.9)');
  cockpitGrad.addColorStop(1, 'rgba(0,100,200,0.4)');
  ctx.fillStyle = cockpitGrad;
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.1, 8, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Reflet cockpit
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(-2, -h * 0.15, 3, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);

  // Ombre
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(4, 6, a.r * 0.9, a.r * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Corps irrégulier
  const grad = ctx.createRadialGradient(-a.r * 0.3, -a.r * 0.3, a.r * 0.1, 0, 0, a.r);
  grad.addColorStop(0, a.color2);
  grad.addColorStop(0.5, a.color1);
  grad.addColorStop(1, a.colorDark);
  ctx.fillStyle = grad;
  ctx.beginPath();
  for (let i = 0; i < a.pts.length; i++) {
    const p = a.pts[i];
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.fill();

  // Contour
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Cratères
  a.craters.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
  });

  ctx.restore();
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  const pulse = Math.sin(tick * 0.1) * 3;
  ctx.shadowBlur = 15 + pulse;
  ctx.shadowColor = p.color;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(0, 0, 12 + pulse * 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.icon, 0, 1);
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawHUD() {
  if (state === 'playing') {
    ctx.save();
    ctx.font = 'bold 36px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(score, W / 2 + 2, 52);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText(score, W / 2, 50);
    ctx.restore();
  }
}

function drawOverlay(title, line1, line2, btnLabel, titleColor) {
  ctx.save();
  ctx.fillStyle = 'rgba(5,10,24,0.82)';
  ctx.fillRect(0, 0, W, H);

  const pw = 320, ph = 230, px = (W - pw) / 2, py = (H - ph) / 2 - 20;
  const panelGrad = ctx.createLinearGradient(px, py, px, py + ph);
  panelGrad.addColorStop(0, 'rgba(0,210,255,0.08)');
  panelGrad.addColorStop(1, 'rgba(123,47,247,0.08)');
  ctx.fillStyle = panelGrad;
  ctx.beginPath();
  ctx.roundRect(px, py, pw, ph, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,210,255,0.35)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.font = 'bold 28px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = titleColor || '#00d2ff';
  ctx.fillText(title, W / 2, py + 52);

  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText(line1, W / 2, py + 90);

  if (line2) {
    ctx.font = '13px "Segoe UI", sans-serif';
    ctx.fillStyle = '#718096';
    ctx.fillText(line2, W / 2, py + 118);
  }

  const bw = 190, bh = 44, bx = (W - bw) / 2, by = py + ph - 62;
  const btnGrad = ctx.createLinearGradient(bx, by, bx + bw, by);
  btnGrad.addColorStop(0, '#00d2ff');
  btnGrad.addColorStop(1, '#7b2ff7');
  ctx.fillStyle = btnGrad;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 22);
  ctx.fill();
  ctx.font = 'bold 15px "Segoe UI", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(btnLabel, W / 2, by + 28);

  ctx.restore();
}

// ================================================================
//  LOGIQUE
// ================================================================

function makeAsteroid() {
  const r = Math.random() * 22 + 14;
  const n = Math.floor(Math.random() * 4 + 7);
  const pts = [];
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n;
    const dist  = r * (0.7 + Math.random() * 0.5);
    pts.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
  }
  const craters = Array.from({length: Math.floor(Math.random() * 3 + 1)}, () => ({
    x: (Math.random() - 0.5) * r,
    y: (Math.random() - 0.5) * r,
    r: Math.random() * 4 + 2,
  }));
  const hue = Math.random() * 40 + 10;
  return {
    x: Math.random() * (W - r * 2) + r,
    y: -r - 10,
    r,
    vx: (Math.random() - 0.5) * 1.5,
    vy: astSpeed + Math.random() * 1.5,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.06,
    pts,
    craters,
    color1:   `hsl(${hue},30%,45%)`,
    color2:   `hsl(${hue},20%,65%)`,
    colorDark:`hsl(${hue},25%,25%)`,
  };
}

function makePowerup() {
  const types = [
    { icon: '❤️', color: '#ff4757', type: 'life' },
    { icon: '⚡', color: '#ffd32a', type: 'slow' },
    { icon: '🛡️', color: '#00d2ff', type: 'shield' },
  ];
  const t = types[Math.floor(Math.random() * types.length)];
  return { x: Math.random() * (W - 40) + 20, y: -20, vy: 1.5, ...t };
}

function spawnExplosion(x, y, big) {
  const n = big ? 40 : 15;
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (big ? 6 : 3) + 1;
    const hue   = Math.random() * 60 + 10;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * (big ? 5 : 3) + 1,
      alpha: 1,
      color: `hsl(${hue},100%,60%)`,
    });
  }
}

function spawnThrustParticle() {
  particles.push({
    x: ship.x + (Math.random() - 0.5) * 12,
    y: ship.y + 24,
    vx: (Math.random() - 0.5) * 1.5,
    vy: Math.random() * 3 + 1,
    r: Math.random() * 3 + 1,
    alpha: 0.7,
    color: `hsl(${Math.random() * 40 + 10},100%,60%)`,
  });
}

function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

function updateLevel() {
  const nl = Math.floor(score / 15) + 1;
  if (nl !== level) {
    level = nl;
    astSpeed    = 2.2 + (level - 1) * 0.4;
    astInterval = Math.max(25, 55 - (level - 1) * 5);
    document.getElementById('levelDisplay').textContent = level;
  }
}

function updateLives() {
  const icons = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
  document.getElementById('livesDisplay').textContent = icons[Math.max(0, lives)] || '💀';
}

// ================================================================
//  BOUCLE PRINCIPALE
// ================================================================

function loop() {
  tick++;
  ctx.clearRect(0, 0, W, H);
  drawBg();

  // Animer étoiles
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });
  nebulae.forEach(n => {
    n.y += n.speed;
    if (n.y - n.ry > H) { n.y = -n.ry; n.x = Math.random() * W; }
  });

  if (state === 'playing') {
    // Contrôles vaisseau
    let moving = false;
    if (keys['ArrowLeft'] || keys['KeyA']) { ship.vx -= 0.8; moving = true; }
    if (keys['ArrowRight'] || keys['KeyD']) { ship.vx += 0.8; moving = true; }
    if (touchX !== null) {
      const rect = canvas.getBoundingClientRect();
      const relX = touchX - rect.left;
      const diff = relX - ship.x;
      ship.vx += diff * 0.08;
    }

    ship.vx *= 0.82;
    ship.x  += ship.vx;
    ship.x   = Math.max(ship.w * 0.7, Math.min(W - ship.w * 0.7, ship.x));

    if (tick % 2 === 0) spawnThrustParticle();

    // Astéroïdes
    astTimer++;
    if (astTimer >= astInterval) { asteroids.push(makeAsteroid()); astTimer = 0; }
    asteroids.forEach(a => {
      a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    });
    asteroids = asteroids.filter(a => a.y - a.r < H + 20);

    // Power-ups
    puTimer++;
    if (puTimer >= 300) { powerups.push(makePowerup()); puTimer = 0; }
    powerups.forEach(p => { p.y += p.vy; });
    powerups = powerups.filter(p => p.y < H + 30);

    // Score
    score++;
    if (tick % 10 === 0) {
      document.getElementById('scoreDisplay').textContent = Math.floor(score / 10);
      updateLevel();
    }

    // Collisions astéroïdes
    if (invincible > 0) invincible--;
    else {
      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        if (circleRect(a.x, a.y, a.r * 0.75, ship.x - ship.w / 2 + 4, ship.y - ship.h / 2 + 4, ship.w - 8, ship.h - 8)) {
          spawnExplosion(a.x, a.y, false);
          asteroids.splice(i, 1);
          lives--;
          updateLives();
          invincible = 90;
          if (lives <= 0) {
            state = 'dead';
            spawnExplosion(ship.x, ship.y, true);
            const finalScore = Math.floor(score / 10);
            if (finalScore > best) {
              best = finalScore;
              localStorage.setItem('rocketDodgeBest', best);
              document.getElementById('bestDisplay').textContent = best;
            }
          }
          break;
        }
      }
    }

    // Collisions power-ups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      const dx = p.x - ship.x, dy = p.y - ship.y;
      if (dx * dx + dy * dy < (12 + 20) * (12 + 20)) {
        spawnExplosion(p.x, p.y, false);
        powerups.splice(i, 1);
        if (p.type === 'life' && lives < 3) { lives++; updateLives(); }
        else if (p.type === 'slow') { astSpeed = Math.max(1, astSpeed - 0.5); }
        else if (p.type === 'shield') { invincible = 180; }
      }
    }
  }

  // Dessin
  asteroids.forEach(drawAsteroid);
  powerups.forEach(drawPowerup);
  if (state !== 'idle') drawShip();

  // Particules
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.alpha -= 0.022;
    p.r = Math.max(0, p.r - 0.03);
  });
  particles = particles.filter(p => p.alpha > 0);
  drawParticles();

  drawHUD();

  if (state === 'idle') {
    drawOverlay('🚀 ROCKET DODGE', 'Meilleur score : ' + best, 'Esquivez les astéroïdes !', '▶ Commencer', '#00d2ff');
  } else if (state === 'dead') {
    const fs = Math.floor(score / 10);
    const isNew = fs === best && fs > 0;
    drawOverlay(
      isNew ? '🏆 Nouveau Record !' : '💥 Vaisseau détruit !',
      'Score : ' + fs + '   Meilleur : ' + best,
      isNew ? 'Félicitations, pilote !' : 'Encore un essai ?',
      '🔄 Rejouer',
      isNew ? '#ffd32a' : '#ff4757'
    );
  }

  frameId = requestAnimationFrame(loop);
}

// ================================================================
//  CONTRÔLES GLOBAUX
// ================================================================

function startGame() {
  ship.x = W / 2; ship.y = H - 90;
  ship.vx = 0;
  asteroids = []; powerups = []; particles = [];
  score = 0; level = 1; lives = 3; invincible = 0;
  astSpeed = 2.2; astInterval = 55; astTimer = 0; puTimer = 0; tick = 0;
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('levelDisplay').textContent = '1';
  updateLives();
  document.getElementById('bestDisplay').textContent = best;
  state = 'playing';
  document.getElementById('startBtn').textContent = '↺ Recommencer';
}

document.getElementById('bestDisplay').textContent = best;
updateLives();
loop();
</script>
