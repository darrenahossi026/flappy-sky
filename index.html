  <script>
  // ============================================================
  //  FLAPPY SKY – Moteur de jeu complet
  // ============================================================

  const canvas  = document.getElementById('gameCanvas');
  const ctx     = canvas.getContext('2d');
  const W       = canvas.width;
  const H       = canvas.height;

  // ---- État global ----
  let gameState = 'idle';   // idle | playing | dead
  let score     = 0;
  let bestScore = parseInt(localStorage.getItem('flappySkyBest') || '0');
  let level     = 1;
  let frameId   = null;
  let lastTime  = 0;

  // ---- Oiseau ----
  const bird = {
    x: 80, y: H / 2,
    vy: 0,
    radius: 18,
    flapPower: -7,
    gravity: 0.38,
    rotation: 0,
    wingAngle: 0,
    wingDir: 1,
    color: '#FFD700',
    eyeColor: '#1a1a2e',
    beakColor: '#FF8C00',
  };

  // ---- Tuyaux ----
  const PIPE_W     = 60;
  const PIPE_GAP   = 155;
  let   pipeSpeed  = 2.4;
  let   pipes      = [];
  let   pipeTimer  = 0;
  const PIPE_INTERVAL = 90; // frames

  // ---- Étoiles de fond ----
  const stars = Array.from({length: 60}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    alpha: Math.random() * 0.7 + 0.3,
    speed: Math.random() * 0.3 + 0.1,
  }));

  // ---- Nuages ----
  const clouds = Array.from({length: 5}, (_, i) => ({
    x: (i / 5) * W + 50,
    y: Math.random() * (H * 0.4),
    w: Math.random() * 80 + 50,
    speed: Math.random() * 0.4 + 0.2,
    alpha: Math.random() * 0.15 + 0.05,
  }));

  // ---- Particules ----
  let particles = [];

  // ============================================================
  //  DESSIN
  // ============================================================

  function drawBackground() {
    // Dégradé ciel
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0,   '#0d1b2a');
    grad.addColorStop(0.5, '#1b2a4a');
    grad.addColorStop(1,   '#0f3460');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Étoiles
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
      ctx.fill();
    });

    // Nuages
    clouds.forEach(c => {
      ctx.save();
      ctx.globalAlpha = c.alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w * 0.5, c.w * 0.2, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x - c.w * 0.2, c.y + 5, c.w * 0.3, c.w * 0.15, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x + c.w * 0.2, c.y + 5, c.w * 0.3, c.w * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Sol
    const groundGrad = ctx.createLinearGradient(0, H - 40, 0, H);
    groundGrad.addColorStop(0, '#1a3a5c');
    groundGrad.addColorStop(1, '#0d1b2a');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H - 40, W, 40);

    // Ligne horizon
    ctx.strokeStyle = 'rgba(100,180,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H - 40);
    ctx.lineTo(W, H - 40);
    ctx.stroke();
  }

  function drawPipe(pipe) {
    // Tuyau du bas
    const btmY = pipe.gapY + PIPE_GAP / 2;
    const btmH = H - 40 - btmY;
    drawPipeRect(pipe.x, btmY, PIPE_W, btmH, false);

    // Tuyau du haut
    const topH = pipe.gapY - PIPE_GAP / 2;
    drawPipeRect(pipe.x, 0, PIPE_W, topH, true);
  }

  function drawPipeRect(x, y, w, h, isTop) {
    const capH = 18, capW = w + 12;
    const capX = x - 6;

    // Corps du tuyau
    const bodyGrad = ctx.createLinearGradient(x, 0, x + w, 0);
    bodyGrad.addColorStop(0,   '#1a5c2a');
    bodyGrad.addColorStop(0.3, '#2ecc71');
    bodyGrad.addColorStop(0.7, '#27ae60');
    bodyGrad.addColorStop(1,   '#145a20');
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(x, y, w, h);

    // Reflet
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x + 6, y, 10, h);

    // Chapeau
    const capY = isTop ? y + h - capH : y;
    const capGrad = ctx.createLinearGradient(capX, 0, capX + capW, 0);
    capGrad.addColorStop(0,   '#145a20');
    capGrad.addColorStop(0.3, '#2ecc71');
    capGrad.addColorStop(0.7, '#27ae60');
    capGrad.addColorStop(1,   '#0d3d15');
    ctx.fillStyle = capGrad;
    ctx.beginPath();
    ctx.roundRect(capX, capY, capW, capH, 4);
    ctx.fill();

    // Ombre chapeau
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(capX, isTop ? capY + capH - 3 : capY, capW, 3);
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);

    // Ombre
    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(4, 6, bird.radius * 0.9, bird.radius * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Corps
    const bodyGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, bird.radius);
    bodyGrad.addColorStop(0, '#FFE066');
    bodyGrad.addColorStop(0.6, '#FFD700');
    bodyGrad.addColorStop(1, '#E6A800');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
    ctx.fill();

    // Contour
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Aile
    ctx.save();
    ctx.rotate(bird.wingAngle * 0.4);
    ctx.fillStyle = '#E6A800';
    ctx.beginPath();
    ctx.ellipse(-4, 2, 12, 7, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    // Ventre
    ctx.fillStyle = 'rgba(255,255,220,0.6)';
    ctx.beginPath();
    ctx.ellipse(4, 4, 9, 7, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Œil
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(8, -5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = bird.eyeColor;
    ctx.beginPath();
    ctx.arc(9, -5, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(10, -6, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Bec
    ctx.fillStyle = bird.beakColor;
    ctx.beginPath();
    ctx.moveTo(14, -3);
    ctx.lineTo(22, -1);
    ctx.lineTo(14, 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#cc6600';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawHUD() {
    // Score central en jeu
    if (gameState === 'playing') {
      ctx.save();
      ctx.font = 'bold 38px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillText(score, W / 2 + 2, 62);
      ctx.fillStyle = '#fff';
      ctx.fillText(score, W / 2, 60);
      ctx.restore();
    }
  }

  function drawScreen(title, sub1, sub2, btnText) {
    // Overlay
    ctx.save();
    ctx.fillStyle = 'rgba(10,20,40,0.78)';
    ctx.fillRect(0, 0, W, H);

    // Panneau
    const pw = 300, ph = 220, px = (W - pw) / 2, py = (H - ph) / 2 - 20;
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 16);
    ctx.fill();
    ctx.strokeStyle = 'rgba(233,69,96,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Titre
    ctx.font = 'bold 32px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.fillText(title, W / 2, py + 55);

    // Sous-titres
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(sub1, W / 2, py + 95);

    if (sub2) {
      ctx.font = '14px "Segoe UI", sans-serif';
      ctx.fillStyle = '#a0aec0';
      ctx.fillText(sub2, W / 2, py + 125);
    }

    // Bouton
    const bw = 180, bh = 44, bx = (W - bw) / 2, by = py + ph - 64;
    const btnGrad = ctx.createLinearGradient(bx, by, bx + bw, by);
    btnGrad.addColorStop(0, '#e94560');
    btnGrad.addColorStop(1, '#c0392b');
    ctx.fillStyle = btnGrad;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 22);
    ctx.fill();
    ctx.font = 'bold 16px "Segoe UI", sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(btnText, W / 2, by + 28);

    ctx.restore();
  }

  // ============================================================
  //  LOGIQUE
  // ============================================================

  function spawnPipe() {
    const minY = 80, maxY = H - 40 - PIPE_GAP / 2 - 80;
    const gapY = Math.random() * (maxY - minY) + minY + PIPE_GAP / 2;
    pipes.push({ x: W + 10, gapY, scored: false });
  }

  function flap() {
    if (gameState === 'idle') { startGame(); return; }
    if (gameState === 'dead') { resetGame(); return; }
    bird.vy = bird.flapPower;
    spawnFlapParticles();
  }

  function spawnFlapParticles() {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: bird.x - bird.radius,
        y: bird.y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.8) * 3,
        vy: (Math.random() - 0.5) * 3,
        r: Math.random() * 4 + 2,
        alpha: 0.8,
        color: `hsl(${Math.random() * 40 + 40}, 100%, 70%)`,
      });
    }
  }

  function spawnDeathParticles() {
    for (let i = 0; i < 30; i++) {
      const angle = (Math.PI * 2 * i) / 30;
      const speed = Math.random() * 5 + 2;
      particles.push({
        x: bird.x, y: bird.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: Math.random() * 6 + 2,
        alpha: 1,
        color: `hsl(${Math.random() * 60 + 10}, 100%, 60%)`,
      });
    }
  }

  function checkCollision() {
    // Sol / plafond
    if (bird.y + bird.radius >= H - 40 || bird.y - bird.radius <= 0) return true;

    // Tuyaux
    for (const p of pipes) {
      const birdLeft  = bird.x - bird.radius + 4;
      const birdRight = bird.x + bird.radius - 4;
      const birdTop   = bird.y - bird.radius + 4;
      const birdBot   = bird.y + bird.radius - 4;

      if (birdRight > p.x && birdLeft < p.x + PIPE_W) {
        const topEdge = p.gapY - PIPE_GAP / 2;
        const botEdge = p.gapY + PIPE_GAP / 2;
        if (birdTop < topEdge || birdBot > botEdge) return true;
      }
    }
    return false;
  }

  function updateLevel() {
    const newLevel = Math.floor(score / 10) + 1;
    if (newLevel !== level) {
      level = newLevel;
      pipeSpeed = 2.4 + (level - 1) * 0.35;
      document.getElementById('levelDisplay').textContent = level;
    }
  }

  // ============================================================
  //  BOUCLE PRINCIPALE
  // ============================================================

  function gameLoop() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    // Animer étoiles
    stars.forEach(s => {
      s.x -= s.speed;
      if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    });

    // Animer nuages
    clouds.forEach(c => {
      c.x -= c.speed;
      if (c.x + c.w < 0) { c.x = W + c.w; c.y = Math.random() * (H * 0.4); }
    });

    if (gameState === 'playing') {
      // Physique oiseau
      bird.vy += bird.gravity;
      bird.y  += bird.vy;
      bird.rotation = Math.max(-0.5, Math.min(Math.PI / 2, bird.vy * 0.07));

      // Animation aile
      bird.wingAngle += bird.wingDir * 0.25;
      if (Math.abs(bird.wingAngle) > 1) bird.wingDir *= -1;

      // Tuyaux
      pipeTimer++;
      if (pipeTimer >= PIPE_INTERVAL) { spawnPipe(); pipeTimer = 0; }

      pipes.forEach(p => { p.x -= pipeSpeed; });
      pipes = pipes.filter(p => p.x + PIPE_W > -10);

      // Score
      pipes.forEach(p => {
        if (!p.scored && p.x + PIPE_W < bird.x - bird.radius) {
          p.scored = true;
          score++;
          document.getElementById('scoreDisplay').textContent = score;
          updateLevel();
        }
      });

      // Collision
      if (checkCollision()) {
        gameState = 'dead';
        spawnDeathParticles();
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('flappySkyBest', bestScore);
          document.getElementById('bestDisplay').textContent = bestScore;
        }
      }
    }

    // Dessin
    pipes.forEach(drawPipe);
    drawBird();

    // Particules
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.1;
      p.alpha -= 0.025;
    });
    particles = particles.filter(p => p.alpha > 0);
    drawParticles();

    drawHUD();

    // Écrans
    if (gameState === 'idle') {
      drawScreen('🐦 Flappy Sky', 'Meilleur score : ' + bestScore, 'Clic / Espace / Tap pour jouer', '▶ Commencer');
    } else if (gameState === 'dead') {
      const isNew = score === bestScore && score > 0;
      drawScreen(
        isNew ? '🏆 Nouveau Record !' : '💥 Game Over',
        'Score : ' + score + '   Meilleur : ' + bestScore,
        isNew ? 'Félicitations !' : 'Encore un essai ?',
        '🔄 Rejouer'
      );
    }

    frameId = requestAnimationFrame(gameLoop);
  }

  // ============================================================
  //  CONTRÔLES
  // ============================================================

  function startGame() {
    resetGame();
    gameState = 'playing';
    document.getElementById('startBtn').textContent = '↺ Recommencer';
  }

  function resetGame() {
    bird.y  = H / 2;
    bird.vy = 0;
    bird.rotation = 0;
    pipes   = [];
    particles = [];
    score   = 0;
    level   = 1;
    pipeSpeed = 2.4;
    pipeTimer = 0;
    document.getElementById('scoreDisplay').textContent = '0';
    document.getElementById('levelDisplay').textContent = '1';
    document.getElementById('bestDisplay').textContent  = bestScore;
    gameState = 'playing';
  }

  // Clavier
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });

  // Souris / Tactile sur canvas
  canvas.addEventListener('click',     flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

  // Initialisation
  document.getElementById('bestDisplay').textContent = bestScore;
  gameLoop();

  </script>
</body>
</html>
